##
## Awesome QR Code Docker – MariaDB
##
## Usage:
##   docker compose -f docker-compose.mariadb.yml up -d
##
## After changing .env, recreate containers to pick up new values:
##   docker compose -f docker-compose.mariadb.yml up -d --force-recreate
##
## Required .env settings:
##   DATABASE_DIALECT=mysql
##   DATABASE_URL=mysql://awesome_qr:changeme@mariadb:3306/awesome_qr
##
## Multiple app instances can share the same MariaDB database
## by pointing DATABASE_URL to an external host instead of the
## "mariadb" service defined below.
##

services:
  app:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY:-awesome-qr-code-docker}:latest
    container_name: awesome-qr
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_DIALECT=mysql
      - DATABASE_URL=mysql://${MARIADB_USER:-awesome_qr}:${MARIADB_PASSWORD:-changeme}@mariadb:3306/${MARIADB_DATABASE:-awesome_qr}
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mariadb:
    image: mariadb:11
    container_name: awesome-qr-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-awesome_qr}
      MARIADB_USER: ${MARIADB_USER:-awesome_qr}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-changeme}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootchangeme}
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb-data:
